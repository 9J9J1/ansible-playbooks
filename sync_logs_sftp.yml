---
- name: Upload Server Logs to Central SFTP Server
  hosts: all
  become: true
  gather_facts: true
  vars:
    # --- 目标 SFTP 服务器配置 ---
    sftp_host: "10.111.6.110"
    sftp_user: "dxedu"
    sftp_password: "Dxedu@2024"
    remote_dir: "/upload/server"
    
    # --- 本地日志配置 ---
    local_log_source: "/var/log"
    temp_archive_path: "/tmp"
    
    # --- 文件名生成逻辑 ---
    host_ip: "{{ ansible_default_ipv4.address | default(ansible_all_ipv4_addresses[0]) }}"
    timestamp: "{{ ansible_date_time.iso8601_basic_short }}"
    archive_filename: "{{ host_ip }}_{{ timestamp }}.tar.gz"
    full_local_path: "{{ temp_archive_path }}/{{ archive_filename }}"

  tasks:
    - name: Ensure temporary directory exists
      file:
        path: "{{ temp_archive_path }}"
        state: directory
        mode: '0755'

    - name: Compress logs into a tarball
      shell: |
        tar -czf {{ full_local_path }} -C {{ local_log_source | dirname }} {{ local_log_source | basename }}
      args:
        creates: "{{ full_local_path }}"
      register: archive_result

    - name: Debug archive info
      debug:
        msg: "Created archive: {{ full_local_path }} for IP: {{ host_ip }}"

    - name: Ensure sshpass is installed
      package:
        name: sshpass
        state: present
      ignore_errors: true

    - name: Upload logs via SFTP
      # 使用 echo 管道代替 << EOF，避免 shell 解析问题
      # 移除已废弃的 warn 参数
      shell: >
        echo -e "cd {{ remote_dir }}\nput {{ full_local_path }}\nbye" | 
        sshpass -p '{{ sftp_password }}' sftp -o StrictHostKeyChecking=no -o BatchMode=no {{ sftp_user }}@{{ sftp_host }}
      args:
        executable: /bin/bash
      register: sftp_result
      ignore_errors: true
      failed_when: sftp_result.rc != 0

    - name: Check Upload Status
      fail:
        msg: "SFTP Upload failed! Return code: {{ sftp_result.rc }}, Stderr: {{ sftp_result.stderr | default('Unknown error') }}"
      when: sftp_result.failed

    - name: Clean up local archive after successful upload
      file:
        path: "{{ full_local_path }}"
        state: absent
      when: not sftp_result.failed

    - name: Success Message
      debug:
        msg: "✅ Successfully uploaded {{ archive_filename }} to {{ sftp_host }}:{{ remote_dir }}"
      when: not sftp_result.failed