---
- name: Upload Server Logs to Central FTP Server (Port 21)
  hosts: all
  become: true
  gather_facts: true
  vars:
    # --- 目标 FTP 服务器配置 ---
    ftp_host: "10.111.6.110"
    ftp_port: 21
    ftp_user: "dxedu"
    ftp_password: "Dxedu@2024"
    remote_dir: "/upload/server"
    
    # --- 本地日志配置 ---
    local_log_source: "/var/log"
    temp_archive_path: "/root/tmp"
    
    # --- 文件名生成逻辑 ---
    # 获取 IP，如果没有默认 IPv4，则取第一个
    host_ip: "{{ ansible_default_ipv4.address | default(ansible_all_ipv4_addresses[0]) }}"
    timestamp: "{{ ansible_date_time.iso8601_basic_short }}"
    archive_filename: "{{ host_ip }}_{{ timestamp }}.tar.gz"
    full_local_path: "{{ temp_archive_path }}/{{ archive_filename }}"

  tasks:
    - name: Ensure temporary directory exists
      file:
        path: "{{ temp_archive_path }}"
        state: directory
        mode: '0755'

    - name: Compress logs into a tarball
      shell: |
        tar -czf {{ full_local_path }} -C {{ local_log_source | dirname }} {{ local_log_source | basename }}
      args:
        creates: "{{ full_local_path }}"
      register: archive_result

    - name: Debug archive info
      debug:
        msg: "Created archive: {{ full_local_path }} for IP: {{ host_ip }}"

    - name: Ensure lftp is installed (Required for FTP uploads)
      package:
        name: lftp
        state: present
      ignore_errors: true
      register: pkg_install

    - name: Fallback to curl if lftp installation failed
      debug:
        msg: "Warning: lftp installation failed or skipped. Will attempt with curl if available."
      when: pkg_install.failed

    - name: Upload logs via FTP (using lftp)
      # 使用 lftp 进行上传，支持被动模式，更适合防火墙环境
      shell: |
        lftp -c "
        open -u {{ ftp_user }},{{ ftp_password }} ftp://{{ ftp_host }}:{{ ftp_port }};
        cd {{ remote_dir }};
        put {{ full_local_path }};
        bye
        "
      args:
        executable: /bin/bash
      register: ftp_result
      ignore_errors: true
      failed_when: ftp_result.rc != 0

    - name: Check Upload Status
      fail:
        msg: "FTP Upload failed! Return code: {{ ftp_result.rc }}, Stderr: {{ ftp_result.stderr | default('Unknown error') }}"
      when: ftp_result.failed

    - name: Clean up local archive after successful upload
      file:
        path: "{{ full_local_path }}"
        state: absent
      when: not ftp_result.failed

    - name: Success Message
      debug:
        msg: "✅ Successfully uploaded {{ archive_filename }} to {{ ftp_host }}:{{ remote_dir }} via FTP (Port 21)"
      when: not ftp_result.failed