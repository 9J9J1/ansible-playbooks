---
- name: Fix SSH AllowTcpForwarding for VS Code Remote
  hosts: all
  become: true
  gather_facts: true
  vars:
    # 高优先级配置文件路径 (openEuler/CentOS 8+ 标准)
    force_config_path: /etc/ssh/sshd_config.d/99-vscode-forwarding.conf
    ssh_service_name: "{{ 'sshd' if ansible_os_family == 'RedHat' else 'ssh' }}"

  tasks:
    - name: Check current runtime SSH configuration
      command: sshd -T
      register: sshd_runtime_config
      changed_when: false
      check_mode: false

    - name: Determine if AllowTcpForwarding is already enabled
      set_fact:
        forwarding_enabled: "{{ 'allowtcpforwarding yes' in sshd_runtime_config.stdout.lower() }}"

    - name: Display current status
      debug:
        msg: >
          Current SSH Runtime Config: 
          {{ sshd_runtime_config.stdout_lines | select('match', '.*allowtcpforwarding.*') | first | default('Not found') }}
          Status: {{ 'Already Enabled' if forwarding_enabled else 'Disabled - Will Fix' }}

    - name: Ensure sshd_config.d directory exists
      file:
        path: /etc/ssh/sshd_config.d
        state: directory
        mode: '0755'
      when: not forwarding_enabled

    - name: Force enable AllowTcpForwarding via high-priority config
      copy:
        dest: "{{ force_config_path }}"
        content: |
          # Auto-generated by AWX to fix VS Code Remote SSH
          # This file has high priority to override other settings
          AllowTcpForwarding yes
          X11Forwarding yes
          PermitTunnel yes
        mode: '0644'
        owner: root
        group: root
      notify: Restart SSHD
      when: not forwarding_enabled

    - name: Scan and fix existing 'no' configurations in main files (Optional Cleanup)
      lineinfile:
        path: "{{ item }}"
        regexp: '^(\s*)AllowTcpForwarding\s+no'
        line: '\1AllowTcpForwarding yes'
        backrefs: true
        state: present
      loop:
        - /etc/ssh/sshd_config
        - /etc/ssh/sshd_config.d/50-redhat.conf
        - /etc/ssh/sshd_config.d/00-forwarding.conf
      ignore_errors: true
      notify: Restart SSHD
      when: not forwarding_enabled

    - name: Verify configuration syntax before restart
      command: sshd -t
      changed_when: false
      failed_when: false
      register: sshd_syntax_check
      when: not forwarding_enabled

    - name: Fail if syntax check failed
      fail:
        msg: "SSH Configuration syntax error detected! Cannot restart service. Check logs."
      when: 
        - not forwarding_enabled
        - sshd_syntax_check.rc != 0

    - name: Final Verification after restart
      command: sshd -T
      register: sshd_final_config
      changed_when: false
      check_mode: false

    - name: Assert Fix Success
      assert:
        that:
          - "'allowtcpforwarding yes' in sshd_final_config.stdout.lower()"
        fail_msg: "Failed to enable AllowTcpForwarding. Please check server logs."
        success_msg: "✅ Success! AllowTcpForwarding is now enabled."

  handlers:
    - name: Restart SSHD
      service:
        name: "{{ ssh_service_name }}"
        state: restarted
      # 在某些容器化或特殊环境中，如果 service 模块失败，可以尝试 command
      ignore_errors: false